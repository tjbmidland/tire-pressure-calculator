server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/tirepressure;
    index index.html;

    # Serve static files
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(css|js|png|json)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Service worker — no cache, always revalidate
    location /sw.js {
        add_header Cache-Control "no-cache";
    }
}

