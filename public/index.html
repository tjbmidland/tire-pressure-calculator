<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calculate optimal tire pressure based on rider weight, bike weight, tire width, and riding conditions">
    <meta name="theme-color" content="#080808">
    <title>Tire Pressure Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-meta">
                <span class="header-mark">+ NUCALORIC SYS</span>
                <span class="header-serial">REV 3.0 ◇ 2026</span>
            </div>
            <h1>Tire Pressure</h1>
            <p class="subtitle">Based on Rene Herse v3 model</p>
        </header>

        <!-- Onboarding -->
        <div id="onboarding" class="onboarding">
            <div class="onboarding-options">
                <button class="onboarding-btn" onclick="showManage('rider')">
                    <span class="onboarding-label">New User</span>
                    <span class="onboarding-desc">Create a profile to save bikes & setups</span>
                </button>
                <div class="onboarding-divider">or</div>
                <button class="onboarding-btn onboarding-btn-secondary" onclick="skipOnboarding()">
                    <span class="onboarding-label">Quick Calculate</span>
                    <span class="onboarding-desc">Use the tool without saving</span>
                </button>
            </div>
        </div>

        <!-- Profile selector -->
        <div id="profileBar" class="profile-bar" style="display: none;">
            <div class="profile-selects">
                <select id="riderSelect"><option value="">Rider</option></select>
                <select id="bikeSelect" disabled><option value="">Bike</option></select>
                <select id="setupSelect" disabled><option value="">Setup</option></select>
            </div>
            <button id="manageBtn" class="btn-link" onclick="toggleManage()">Manage</button>
        </div>

        <!-- Management panel -->
        <div id="managePanel" class="manage-panel" style="display: none;">
            <div class="manage-section">
                <h3>Riders</h3>
                <div id="riderList" class="item-list"></div>
                <div class="add-row">
                    <input type="text" id="newRiderName" placeholder="Name">
                    <button onclick="addRider()">Add</button>
                </div>
            </div>
            <div class="manage-section">
                <h3>Bikes <span id="bikeRiderLabel"></span></h3>
                <div id="bikeList" class="item-list"></div>
                <div class="add-form" id="addBikeForm" style="display: none;">
                    <input type="text" id="newBikeName" placeholder="Bike name">
                    <label class="form-label">Tire width unit</label>
                    <select id="newBikeTireUnit">
                        <option value="mm">mm</option>
                        <option value="in">inches</option>
                    </select>
                    <label class="form-label">Front tire width</label>
                    <input type="number" id="newBikeFrontTireWidth" placeholder="Width" step="0.5">
                    <label class="form-label">Rear tire width (blank = same as front)</label>
                    <input type="number" id="newBikeRearTireWidth" placeholder="Width" step="0.5">
                    <label class="form-label">Rim internal width (mm)</label>
                    <input type="number" id="newBikeRimWidth" placeholder="23" step="0.5" value="23">
                    <label class="form-label">Casing</label>
                    <select id="newBikeCasing">
                        <option value="endurance">Endurance</option>
                        <option value="endurance_plus">Endurance+</option>
                        <option value="standard">Standard</option>
                        <option value="extralight">Extralight/Race</option>
                    </select>
                    <label class="toggle-label">
                        <input type="checkbox" id="newBikeTubeless" checked>
                        <span>Tubeless</span>
                    </label>
                    <button onclick="addBike()">Add Bike</button>
                </div>
                <button class="btn-link" onclick="toggleAddBike()">+ New Bike</button>
            </div>
            <div class="manage-section">
                <h3>Setups <span id="setupBikeLabel"></span></h3>
                <div id="setupList" class="item-list"></div>
                <div class="add-form" id="addSetupForm" style="display: none;">
                    <input type="text" id="newSetupName" placeholder="Setup name (e.g. Normal, Bikepacking)">
                    <label class="form-label">Weight unit</label>
                    <select id="newSetupWeightUnit">
                        <option value="lbs">lbs</option>
                        <option value="kg">kg</option>
                    </select>
                    <label class="form-label">Rider weight</label>
                    <input type="number" id="newSetupRiderWeight" placeholder="Weight" step="0.5">
                    <label class="form-label">Bike weight</label>
                    <input type="number" id="newSetupBikeWeight" placeholder="Weight" step="0.1">
                    <label class="form-label">Front luggage weight</label>
                    <input type="number" id="newSetupFrontLuggage" placeholder="0" step="0.1">
                    <label class="form-label">Rear luggage weight</label>
                    <input type="number" id="newSetupRearLuggage" placeholder="0" step="0.1">
                    <label class="form-label">Frame load (splits equally front/rear)</label>
                    <input type="number" id="newSetupFrameLoad" placeholder="0" step="0.1">
                    <label class="form-label">Bike type</label>
                    <select id="newSetupBikeType">
                        <option value="gravel">Gravel / Hardtail XC</option>
                        <option value="road">Road</option>
                        <option value="mountain">Mountain (Full Sus / Slack Geo)</option>
                    </select>
                    <label class="form-label">Rider height / Frame size</label>
                    <select id="newSetupFrameSize">
                        <option value="medium">Medium (5'5"–6'0" / 165–182cm)</option>
                        <option value="small">Small (under 5'6" / 168cm)</option>
                        <option value="tall">Tall (over 6'0" / 182cm)</option>
                    </select>
                    <label class="form-label">Riding position</label>
                    <select id="newSetupRidingPosition">
                        <option value="intermediate">Intermediate</option>
                        <option value="upright">Upright</option>
                        <option value="low">Low / Stretched out</option>
                        <option value="aero">Aero / Flat back</option>
                    </select>
                    <label class="form-label">Terrain</label>
                    <select id="newSetupSurface">
                        <option value="smooth_gravel">Smooth gravel</option>
                        <option value="smooth_asphalt">Smooth asphalt</option>
                        <option value="rough_asphalt">Rough asphalt</option>
                        <option value="coarse_gravel">Coarse gravel</option>
                        <option value="rough_gravel">Rough gravel / Large rocks</option>
                        <option value="mixed_paved_gravel">Mixed paved/gravel</option>
                        <option value="singletrack">Singletrack / Mountain</option>
                    </select>
                    <button onclick="addSetup()">Add Setup</button>
                </div>
                <button class="btn-link" onclick="toggleAddSetup()">+ New Setup</button>
            </div>
        </div>

        <!-- Saved pressures (above calculator) -->
        <div id="history" class="history" style="display: none;">
            <div class="history-header">
                <h2>Saved Pressures</h2>
                <span class="history-count" id="historyCount"></span>
            </div>
            <div id="historyList"></div>
        </div>

        <!-- Calculator -->
        <div id="calculator" class="calculator" style="display: none;">
            <div class="calculator-header">
                <span class="calculator-label">Calculate</span>
                <span class="calculator-serial">SYS::CALC ◇ +</span>
            </div>

            <div class="input-row-pair">
                <div class="input-group">
                    <label for="frontTireWidth">Front Tire Width</label>
                    <div class="calc-input-row">
                        <input type="number" id="frontTireWidth" min="1" step="0.5" placeholder="Width">
                        <select id="tireUnit">
                            <option value="mm">mm</option>
                            <option value="in">in</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label for="rearTireWidth">Rear Tire Width</label>
                    <div class="calc-input-row">
                        <input type="number" id="rearTireWidth" min="1" step="0.5" placeholder="Same as front">
                        <span class="unit-label" id="rearTireUnit">mm</span>
                    </div>
                </div>
            </div>

            <div class="input-row-pair">
                <div class="input-group">
                    <label for="rimWidth">Rim Internal Width</label>
                    <div class="calc-input-row">
                        <input type="number" id="rimWidth" min="13" step="0.5" value="23" placeholder="23">
                        <span class="unit-label">mm</span>
                    </div>
                </div>
                <div class="input-group">
                    <label for="casingType">Casing</label>
                    <select id="casingType">
                        <option value="endurance">Endurance</option>
                        <option value="endurance_plus">Endurance+</option>
                        <option value="standard">Standard</option>
                        <option value="extralight">Extralight/Race</option>
                    </select>
                </div>
            </div>

            <div class="input-row-pair">
                <div class="input-group">
                    <label class="toggle-label">
                        <input type="checkbox" id="isTubeless" checked>
                        <span>Tubeless</span>
                    </label>
                </div>
                <div class="input-group">
                    <label for="bikeType">Bike Type</label>
                    <select id="bikeType">
                        <option value="gravel">Gravel / Hardtail XC</option>
                        <option value="road">Road</option>
                        <option value="mountain">Mountain (Full Sus / Slack Geo)</option>
                    </select>
                </div>
            </div>

            <div class="input-row-pair">
                <div class="input-group">
                    <label for="riderWeight">Rider Weight</label>
                    <div class="calc-input-row">
                        <input type="number" id="riderWeight" min="1" step="0.5" placeholder="Weight">
                        <select id="weightUnit">
                            <option value="lbs">lbs</option>
                            <option value="kg">kg</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label for="bikeWeight">Bike Weight</label>
                    <div class="calc-input-row">
                        <input type="number" id="bikeWeight" min="1" step="0.1" placeholder="Weight">
                        <span class="unit-label" id="bikeWeightUnit">lbs</span>
                    </div>
                </div>
            </div>

            <div class="input-row-pair">
                <div class="input-group">
                    <label for="frontLuggage">Front Luggage</label>
                    <div class="calc-input-row">
                        <input type="number" id="frontLuggage" min="0" step="0.1" value="0" placeholder="0">
                        <span class="unit-label" id="frontLuggageUnit">lbs</span>
                    </div>
                </div>
                <div class="input-group">
                    <label for="rearLuggage">Rear Luggage</label>
                    <div class="calc-input-row">
                        <input type="number" id="rearLuggage" min="0" step="0.1" value="0" placeholder="0">
                        <span class="unit-label" id="rearLuggageUnit">lbs</span>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label for="frameLoad">Frame Load (splits equally front/rear)</label>
                <div class="calc-input-row">
                    <input type="number" id="frameLoad" min="0" step="0.1" value="0" placeholder="0">
                    <span class="unit-label" id="frameLoadUnit">lbs</span>
                </div>
            </div>

            <div class="input-row-pair">
                <div class="input-group">
                    <label for="frameSize">Rider Height / Frame Size</label>
                    <select id="frameSize">
                        <option value="medium">Medium (5'5"–6'0" / 165–182cm)</option>
                        <option value="small">Small (under 5'6" / 168cm)</option>
                        <option value="tall">Tall (over 6'0" / 182cm)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="ridingPosition">Riding Position</label>
                    <select id="ridingPosition">
                        <option value="intermediate">Intermediate</option>
                        <option value="upright">Upright</option>
                        <option value="low">Low / Stretched</option>
                        <option value="aero">Aero / Flat back</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label for="surfaceType">Terrain</label>
                <select id="surfaceType">
                    <option value="smooth_gravel">Smooth gravel</option>
                    <option value="smooth_asphalt">Smooth asphalt</option>
                    <option value="rough_asphalt">Rough asphalt</option>
                    <option value="coarse_gravel">Coarse gravel</option>
                    <option value="rough_gravel">Rough gravel / Large rocks</option>
                    <option value="mixed_paved_gravel">Mixed paved/gravel</option>
                    <option value="singletrack">Singletrack / Mountain</option>
                </select>
            </div>

            <button id="calculateBtn" class="calculate-btn">Calculate</button>

            <div id="results" class="results" style="display: none;">
                <div class="results-header">
                    <h2>Recommended Pressure</h2>
                    <span class="results-serial">OUTPUT ◇ +</span>
                </div>
                <div class="pressure-grid">
                    <div class="pressure-card">
                        <div class="pressure-card-label">Front</div>
                        <div class="pressure-card-value">
                            <span class="value" id="frontPsi">--</span>
                            <span class="value-unit">psi</span>
                        </div>
                        <div class="pressure-card-secondary">
                            <span class="value-bar" id="frontBar">--</span>
                            <span class="value-unit-small">bar</span>
                        </div>
                    </div>
                    <div class="pressure-card">
                        <div class="pressure-card-label">Rear</div>
                        <div class="pressure-card-value">
                            <span class="value" id="rearPsi">--</span>
                            <span class="value-unit">psi</span>
                        </div>
                        <div class="pressure-card-secondary">
                            <span class="value-bar" id="rearBar">--</span>
                            <span class="value-unit-small">bar</span>
                        </div>
                    </div>
                </div>
                <button id="saveBtn" class="btn-link save-btn" style="display: none;" onclick="savePressure()">Save this result</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
