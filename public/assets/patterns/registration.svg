<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Registration crosshair top-left -->
  <line x1="10" y1="20" x2="30" y2="20" stroke="rgba(122,138,46,0.15)" stroke-width="0.5"/>
  <line x1="20" y1="10" x2="20" y2="30" stroke="rgba(122,138,46,0.15)" stroke-width="0.5"/>
  <circle cx="20" cy="20" r="3" fill="none" stroke="rgba(122,138,46,0.1)" stroke-width="0.5"/>

  <!-- Registration crosshair bottom-right -->
  <line x1="170" y1="180" x2="190" y2="180" stroke="rgba(122,138,46,0.15)" stroke-width="0.5"/>
  <line x1="180" y1="170" x2="180" y2="190" stroke="rgba(122,138,46,0.15)" stroke-width="0.5"/>
  <circle cx="180" cy="180" r="3" fill="none" stroke="rgba(122,138,46,0.1)" stroke-width="0.5"/>

  <!-- Fiducial marker -->
  <rect x="95" y="95" width="10" height="10" fill="none" stroke="rgba(122,138,46,0.08)" stroke-width="0.5"/>
  <line x1="100" y1="90" x2="100" y2="110" stroke="rgba(122,138,46,0.06)" stroke-width="0.3"/>
  <line x1="90" y1="100" x2="110" y2="100" stroke="rgba(122,138,46,0.06)" stroke-width="0.3"/>
</svg>
